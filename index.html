<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A two-player co-op multiverse game: help love outshine entropy." />
    <meta name="theme-color" content="#0B0A18" />
    <title>Multiversal Love Explosion</title>
    <!-- Strict Content-Security-Policy. default-src 'none' denies every
         resource type by default; only same-origin script/style/img/font are
         re-allowed, and the game makes zero network requests (connect falls
         back to 'none'). require-trusted-types-for neutralises DOM-XSS sinks.
         Delivered via <meta> because static hosts can't set HTTP headers; the
         dev server strips this tag (see stripCspMetaInDev in vite.config.ts),
         production keeps it. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; require-trusted-types-for 'script'"
    />
    <!-- Don't leak the game's URL to any site a player navigates to from here. -->
    <meta name="referrer" content="no-referrer" />
  </head>
  <body>
    <noscript>
      <p class="noscript-notice">
        Multiversal Love Explosion is a canvas game and needs JavaScript to run.
        Please enable it (there are no trackers, ads, or third-party scripts here).
      </p>
    </noscript>
    <canvas id="stage" width="1280" height="800" aria-label="The Multiverse"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
